server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

demo:
  kafka:
    enabled: true
    bootstrap-servers: localhost:9092
    input-topic: driftguard.demo.metrics
    output-topic: driftguard.demo.drift-events
    application-id: driftguard-demo-streams
    consumer-group: driftguard-demo-ui
    playback-interval: 150ms
  tools:
    kafka-ui-url: http://localhost:8090
    prometheus-url: http://localhost:9090
    grafana-url: http://localhost:3000
    swagger-url: /swagger-ui.html

driftguard:
  enabled: true
  alerts:
    enabled: true
    logging-enabled: true
    webhook:
      enabled: true
      url: http://localhost:${server.port}/internal/alerts/driftguard
      timeout: 2s
      headers:
        X-Demo-Alert-Channel: driftguard-demo
  kafka:
    enabled: true
    bootstrap-servers: localhost:9092
    application-id: driftguard-demo-streams
    input-topics: [driftguard.demo.metrics]
    output-topic: driftguard.demo.drift-events
    auto-startup: false
    state-dir: ./target/driftguard-demo-kafka-state
  micrometer-input:
    enabled: true
    poll-interval: 2s
    meters:
      - name: checkout.queue.size
        type: GAUGE
        service: checkout-service
        metric: queue-size-micrometer
        operation: "POST /checkout"
        instance: checkout-api-1
        kind: SIZE
        tags:
          operation: "POST /checkout"
          component: checkout
  detectors-enabled: true
  detectors:
    - name: latency-page-hinkley
      enabled: true
      algorithm: page-hinkley
      profile: adaptive
      adaptive-calibration-samples: 20
      services: [checkout-service]
      metrics: [latency]
      operations: ["POST /checkout"]
      warmup-samples: 8
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 50.0
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 1
        cooldown: 12s
        recovery-consecutive-normal: 3
    - name: queue-size-micrometer-page-hinkley
      enabled: true
      algorithm: page-hinkley
      profile: adaptive
      adaptive-calibration-samples: 20
      services: [checkout-service]
      metrics: [queue-size-micrometer]
      operations: ["POST /checkout"]
      warmup-samples: 8
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 60.0
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 1
        cooldown: 12s
        recovery-consecutive-normal: 3
    - name: error-rate-page-hinkley
      enabled: true
      algorithm: page-hinkley
      profile: adaptive
      adaptive-calibration-samples: 20
      services: [checkout-service]
      metrics: [error-rate]
      operations: ["POST /checkout"]
      warmup-samples: 8
      delta: 0.001
      warning-threshold: 0.045
      critical-threshold: 0.14
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 1
        cooldown: 12s
        recovery-consecutive-normal: 3
    - name: throughput-page-hinkley
      enabled: true
      algorithm: page-hinkley
      profile: adaptive
      adaptive-calibration-samples: 20
      services: [checkout-service]
      metrics: [throughput]
      operations: ["POST /checkout"]
      warmup-samples: 8
      delta: 1.0
      warning-threshold: 120.0
      critical-threshold: 250.0
      alpha: 0.05
      direction: DOWN
      emission-policy:
        min-consecutive-signals: 1
        cooldown: 12s
        recovery-consecutive-normal: 3
    - name: queue-size-page-hinkley
      enabled: true
      algorithm: page-hinkley
      profile: adaptive
      adaptive-calibration-samples: 20
      services: [checkout-service]
      metrics: [queue-size]
      operations: ["POST /checkout"]
      warmup-samples: 8
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 60.0
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 1
        cooldown: 12s
        recovery-consecutive-normal: 3
