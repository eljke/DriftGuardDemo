server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

demo:
  kafka:
    enabled: true
    bootstrap-servers: localhost:9092
    input-topic: driftguard.demo.metrics
    output-topic: driftguard.demo.drift-events
    application-id: driftguard-demo-streams
    consumer-group: driftguard-demo-ui
    playback-interval: 150ms
  tools:
    kafka-ui-url: http://localhost:8090
    prometheus-url: http://localhost:9090
    grafana-url: http://localhost:3000
    swagger-url: /swagger-ui.html

driftguard:
  enabled: true
  kafka:
    enabled: true
    bootstrap-servers: localhost:9092
    application-id: driftguard-demo-streams
    input-topics: [driftguard.demo.metrics]
    output-topic: driftguard.demo.drift-events
    auto-startup: false
    state-dir: ./target/driftguard-demo-kafka-state
  detectors-enabled: true
  detectors:
    - name: latency-page-hinkley
      enabled: true
      algorithm: page-hinkley
      services: [checkout-service]
      metrics: [latency]
      operations: ["POST /checkout"]
      warmup-samples: 20
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 50.0
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 2
        cooldown: 10s
        recovery-consecutive-normal: 3
    - name: error-rate-page-hinkley
      enabled: true
      algorithm: page-hinkley
      metrics: [error-rate]
      warmup-samples: 20
      delta: 0.001
      warning-threshold: 0.045
      critical-threshold: 0.14
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 2
        cooldown: 45s
        recovery-consecutive-normal: 3
    - name: throughput-page-hinkley
      enabled: true
      algorithm: page-hinkley
      metrics: [throughput]
      warmup-samples: 20
      delta: 1.0
      warning-threshold: 120.0
      critical-threshold: 250.0
      alpha: 0.05
      direction: DOWN
      emission-policy:
        min-consecutive-signals: 2
        cooldown: 10s
        recovery-consecutive-normal: 3
    - name: queue-size-page-hinkley
      enabled: true
      algorithm: page-hinkley
      metrics: [queue-size]
      warmup-samples: 20
      delta: 0.1
      warning-threshold: 25.0
      critical-threshold: 60.0
      alpha: 0.05
      emission-policy:
        min-consecutive-signals: 2
        cooldown: 10s
        recovery-consecutive-normal: 3
